name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch the GitHub avatar to serve it first-party
        run: curl -fsSL "https://avatars.githubusercontent.com/u/10452445?v=4" -o avatar.png

      - name: Build Tailwind CSS
        run: |
          npm install --no-save --no-audit --no-fund tailwindcss @tailwindcss/cli
          npx @tailwindcss/cli -i src/styles.css -o style.css --minify
          rm -rf node_modules package.json package-lock.json

      - name: Cache-bust asset URLs with the commit SHA
        run: |
          VERSION="${GITHUB_SHA::7}"
          sed -i "s|src=\"app.js\"|src=\"app.js?v=${VERSION}\"|; s|href=\"style.css\"|href=\"style.css?v=${VERSION}\"|; s|href=\"/style.css\"|href=\"/style.css?v=${VERSION}\"|" index.html 404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
