name: Probe custom domain

on: push

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Check the custom domain end to end
        run: |
          sleep 60
          echo "== https://enricodelazzari.com/ =="
          curl -sI https://enricodelazzari.com/ | head -8
          echo "== index references =="
          curl -s https://enricodelazzari.com/ | grep -o 'style.css?v=[a-z0-9]*\|canonical" href="[^"]*"' | head -4
          echo "== style.css status =="
          curl -s -o /dev/null -w "%{http_code}\n" https://enricodelazzari.com/style.css
          echo "== avatar.png status =="
          curl -s -o /dev/null -w "%{http_code}\n" https://enricodelazzari.com/avatar.png
          echo "== www redirect =="
          curl -sI https://www.enricodelazzari.com/ | grep -i '^HTTP\|^location' | head -4
          echo "== github.io redirect =="
          curl -sI https://enricodelazzari.github.io/ | grep -i '^HTTP\|^location' | head -4
