<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found — Enrico De Lazzari</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/avatar.png">
  <script>
    document.documentElement.classList.toggle(
      "dark",
      localStorage.theme === "dark" ||
        (!("theme" in localStorage) && matchMedia("(prefers-color-scheme: dark)").matches)
    );
  </script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-zinc-50 text-zinc-900 antialiased dark:bg-zinc-950 dark:text-zinc-100">
  <main class="mx-auto flex min-h-screen max-w-[60rem] flex-col items-center justify-center px-5 text-center">
    <p class="text-7xl font-bold text-violet-600 dark:text-violet-400">404</p>
    <h1 class="mt-4 text-2xl font-bold">Page not found</h1>
    <p class="mt-2 text-zinc-500 dark:text-zinc-400">The page you're looking for doesn't exist or has moved.</p>
    <a class="mt-6 rounded-lg bg-violet-600 px-5 py-2.5 font-semibold text-white hover:brightness-110" href="/">Back to the homepage</a>
  </main>
</body>
</html>
